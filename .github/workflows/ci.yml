name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
      - name: Check Java
        run: ./gradlew check

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all --check
        working-directory: rust
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: rust
      - name: Test Rust
        run: cargo test
        working-directory: rust

  release-dry-run:
    runs-on: ubuntu-latest
    needs: [java, rust]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
      - uses: dtolnay/rust-toolchain@stable
      - name: Java Maven publish dry run
        run: ./gradlew publishToMavenLocal --no-configuration-cache
      - name: Rust crate publish dry run
        run: cargo publish --dry-run -p mortar-compiler
        working-directory: rust
