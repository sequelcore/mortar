name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
      - name: Check Java
        run: ./gradlew check

  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all --check
        working-directory: rust
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: rust
      - name: Test Rust
        run: cargo test
        working-directory: rust

  vscode:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install VS Code dependencies
        run: bun install --frozen-lockfile
        working-directory: editors/vscode
      - name: Typecheck VS Code extension
        run: bun run typecheck
        working-directory: editors/vscode
      - name: Package VS Code extension
        run: bun run package:vsix
        working-directory: editors/vscode

  release-dry-run:
    runs-on: ubuntu-latest
    needs: [java, rust, vscode]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - name: Java Maven publish dry run
        run: ./gradlew publishToMavenLocal --no-daemon --no-configuration-cache
      - name: Rust crate package inspection
        run: |
          cargo package --list -p sequel-mortar-compiler
          cargo package --list -p sequel-mortar-cli
          cargo package --list -p sequel-mortar-lsp
        working-directory: rust
      - name: Rust compiler crate publish dry run
        run: cargo publish --dry-run -p sequel-mortar-compiler
        working-directory: rust
      - name: Install VS Code dependencies
        run: bun install --frozen-lockfile
        working-directory: editors/vscode
      - name: VS Code package dry run
        run: bun run package:vsix
        working-directory: editors/vscode
