name: Release Readiness

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2g
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Check
        run: ./gradlew check --no-daemon

      - name: Java Maven local publish dry run
        run: ./gradlew publishToMavenLocal --no-daemon --no-configuration-cache

      - name: Rust crate package inspection
        run: |
          cargo package --list -p mortar-compiler
          cargo package --list -p mortar-cli
          cargo package --list -p mortar-lsp
        working-directory: rust

      - name: Rust compiler crate publish dry run
        run: cargo publish --dry-run -p mortar-compiler
        working-directory: rust

      - name: Install VS Code dependencies
        run: bun install --frozen-lockfile
        working-directory: editors/vscode

      - name: VS Code package dry run
        run: bun run package:vsix
        working-directory: editors/vscode
